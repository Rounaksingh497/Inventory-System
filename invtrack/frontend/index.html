<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InvTrack — Inventory Management</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<!-- ═══ AUTH SCREEN ═══════════════════════════════════════════════════════════ -->
<div id="auth-screen" class="auth-screen">
  <div class="auth-bg">
    <div class="auth-orb auth-orb-1"></div>
    <div class="auth-orb auth-orb-2"></div>
    <div class="auth-orb auth-orb-3"></div>
  </div>
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon-lg">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <rect x="3" y="3" width="7" height="7" rx="1.5"/>
          <rect x="14" y="3" width="7" height="7" rx="1.5"/>
          <rect x="3" y="14" width="7" height="7" rx="1.5"/>
          <rect x="14" y="14" width="7" height="7" rx="1.5"/>
        </svg>
      </div>
      <h1>InvTrack</h1>
      <p>Inventory Management System</p>
    </div>

    <!-- Tab switcher -->
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login"    onclick="switchAuthTab('login')">Sign In</button>
      <button class="auth-tab"        id="tab-register" onclick="switchAuthTab('register')">Create Account</button>
    </div>

    <div id="auth-error"   class="alert alert-error  hidden"></div>
    <div id="auth-success" class="alert alert-success hidden"></div>

    <!-- ── LOGIN FORM ── -->
    <div id="form-login">
      <div class="form-group">
        <label>Email address</label>
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8">
            <rect x="1" y="3" width="14" height="10" rx="1.5"/><path d="M1 5l7 5 7-5"/>
          </svg>
          <input type="email" id="login-email" placeholder="you@example.com" autocomplete="email" />
        </div>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8">
            <rect x="2" y="7" width="12" height="8" rx="1.5"/><path d="M5 7V5a3 3 0 016 0v2"/>
          </svg>
          <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" />
          <button class="btn-icon-inline" type="button" onclick="togglePasswordVisibility('login-password','eye-icon-login')" title="Show/hide">
            <svg id="eye-icon-login" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M1 8C2.5 4.5 5 3 8 3s5.5 1.5 7 5c-1.5 3.5-4 5-7 5s-5.5-1.5-7-5z"/>
              <circle cx="8" cy="8" r="2"/>
            </svg>
          </button>
        </div>
      </div>
      <button class="btn btn-primary btn-full" id="login-btn" onclick="login()">
        <span id="login-btn-text">Sign in</span>
        <svg id="login-spinner" class="spin hidden" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="8" cy="8" r="6" stroke-opacity="0.25"/>
          <path d="M14 8a6 6 0 00-6-6"/>
        </svg>
      </button>
      <p style="text-align:center;margin-top:1rem;font-size:12px;color:rgba(255,255,255,0.4)">
        New here?
        <button onclick="switchAuthTab('register')" style="background:none;border:none;color:rgba(255,255,255,0.75);cursor:pointer;font-size:12px;font-weight:600;text-decoration:underline;padding:0">Create an account</button>
      </p>
    </div>

    <!-- ── REGISTER FORM ── -->
    <div id="form-register" class="hidden">
      <div class="form-group">
        <label>Full name</label>
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8">
            <circle cx="8" cy="5" r="3"/><path d="M2 14c0-3 2.7-5 6-5s6 2 6 5"/>
          </svg>
          <input type="text" id="reg-name" placeholder="Your full name" autocomplete="name" />
        </div>
      </div>
      <div class="form-group">
        <label>Email address</label>
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8">
            <rect x="1" y="3" width="14" height="10" rx="1.5"/><path d="M1 5l7 5 7-5"/>
          </svg>
          <input type="email" id="reg-email" placeholder="you@example.com" autocomplete="email" />
        </div>
      </div>
      <div class="form-group">
        <label>Password <span style="font-weight:400;font-size:11px;color:rgba(255,255,255,0.35)">(min 6 characters)</span></label>
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8">
            <rect x="2" y="7" width="12" height="8" rx="1.5"/><path d="M5 7V5a3 3 0 016 0v2"/>
          </svg>
          <input type="password" id="reg-password" placeholder="Min 6 characters" autocomplete="new-password" />
          <button class="btn-icon-inline" type="button" onclick="togglePasswordVisibility('reg-password','eye-icon-reg')" title="Show/hide">
            <svg id="eye-icon-reg" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M1 8C2.5 4.5 5 3 8 3s5.5 1.5 7 5c-1.5 3.5-4 5-7 5s-5.5-1.5-7-5z"/>
              <circle cx="8" cy="8" r="2"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="form-group">
        <label>Confirm password</label>
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8">
            <rect x="2" y="7" width="12" height="8" rx="1.5"/><path d="M5 7V5a3 3 0 016 0v2"/>
          </svg>
          <input type="password" id="reg-confirm" placeholder="Re-enter password" autocomplete="new-password" />
        </div>
      </div>
      <div class="form-group">
        <label>Role</label>
        <select id="reg-role" style="background:rgba(255,255,255,0.06);border-color:rgba(255,255,255,0.12);color:#fff;">
          <option value="staff"   style="background:#1a1f36;color:#fff">Staff</option>
          <option value="manager" style="background:#1a1f36;color:#fff">Manager</option>
          <option value="admin"   style="background:#1a1f36;color:#fff">Admin</option>
        </select>
      </div>
      <button class="btn btn-primary btn-full" id="reg-btn" onclick="register()">
        <span id="reg-btn-text">Create account</span>
        <svg id="reg-spinner" class="spin hidden" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="8" cy="8" r="6" stroke-opacity="0.25"/>
          <path d="M14 8a6 6 0 00-6-6"/>
        </svg>
      </button>
      <p style="text-align:center;margin-top:1rem;font-size:12px;color:rgba(255,255,255,0.4)">
        Already have an account?
        <button onclick="switchAuthTab('login')" style="background:none;border:none;color:rgba(255,255,255,0.75);cursor:pointer;font-size:12px;font-weight:600;text-decoration:underline;padding:0">Sign in</button>
      </p>
    </div>

  </div>
</div>

<!-- ═══ APP ═══════════════════════════════════════════════════════════════════ -->
<div id="app" class="app hidden">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <div class="logo-icon-sm">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8">
            <rect x="1" y="1" width="6" height="6" rx="1"/>
            <rect x="9" y="1" width="6" height="6" rx="1"/>
            <rect x="1" y="9" width="6" height="6" rx="1"/>
            <rect x="9" y="9" width="6" height="6" rx="1"/>
          </svg>
        </div>
        <span class="logo-text">InvTrack</span>
      </div>
      <button class="sidebar-toggle" onclick="toggleSidebar()" title="Collapse sidebar">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M10 4l-4 4 4 4"/>
        </svg>
      </button>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section-label">Main</div>

      <a class="nav-item active" data-page="dashboard" onclick="navigate('dashboard')">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8">
          <rect x="1" y="1" width="6" height="6" rx="1"/>
          <rect x="9" y="1" width="6" height="6" rx="1"/>
          <rect x="1" y="9" width="6" height="6" rx="1"/>
          <rect x="9" y="9" width="6" height="6" rx="1"/>
        </svg>
        <span>Dashboard</span>
      </a>

      <a class="nav-item" data-page="inventory" onclick="navigate('inventory')">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8">
          <rect x="2" y="2" width="12" height="12" rx="1.5"/>
          <line x1="2" y1="6" x2="14" y2="6"/>
          <line x1="6" y1="6" x2="6" y2="14"/>
        </svg>
        <span>Inventory</span>
      </a>

      <a class="nav-item" data-page="orders" onclick="navigate('orders')">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M2 4h12M2 8h8M2 12h5"/>
        </svg>
        <span>Orders</span>
        <span class="nav-badge" id="pending-badge" style="display:none">0</span>
      </a>

      <a class="nav-item" data-page="categories" onclick="navigate('categories')">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8">
          <circle cx="5" cy="5" r="3"/>
          <circle cx="11" cy="5" r="3"/>
          <circle cx="8" cy="11" r="3"/>
        </svg>
        <span>Categories</span>
      </a>

      <div class="nav-section-label" style="margin-top:1rem">System</div>

      <a class="nav-item" onclick="openSettingsModal()">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8">
          <circle cx="8" cy="8" r="2.5"/>
          <path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.22 3.22l1.41 1.41M11.37 11.37l1.41 1.41M3.22 12.78l1.41-1.41M11.37 4.63l1.41-1.41"/>
        </svg>
        <span>Settings</span>
      </a>
    </nav>

    <div class="sidebar-user">
      <div class="user-avatar" id="nav-avatar">A</div>
      <div class="user-info">
        <div class="user-name" id="nav-username">Loading…</div>
        <div class="user-role" id="nav-role">—</div>
      </div>
      <button class="btn-icon" onclick="logout()" title="Sign out">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M6 2H3a1 1 0 00-1 1v10a1 1 0 001 1h3M11 11l3-3-3-3M14 8H6"/>
        </svg>
      </button>
    </div>
  </aside>

  <!-- Main content -->
  <main class="main-content">
    <div id="page-dashboard" class="page active"></div>
    <div id="page-inventory" class="page hidden"></div>
    <div id="page-orders"    class="page hidden"></div>
    <div id="page-categories"class="page hidden"></div>
  </main>
</div>

<!-- ═══ MODAL ═════════════════════════════════════════════════════════════════ -->
<div id="modal-overlay" class="modal-overlay hidden" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <h3 id="modal-title">Modal</h3>
      <button class="btn-icon" onclick="closeModal()">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="3" x2="13" y2="13"/>
          <line x1="13" y1="3" x2="3" y2="13"/>
        </svg>
      </button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<!-- ═══ TOAST ═════════════════════════════════════════════════════════════════ -->
<div id="toast-container"></div>

<!-- ═══ SCRIPTS (ORDER MATTERS) ══════════════════════════════════════════════ -->
<!-- api.js must load first (defines api, getToken, setToken, clearToken) -->
<script src="js/api.js"></script>
<!-- app.js next (defines navigate, toast, helpers used by all pages) -->
<script src="js/app.js"></script>
<!-- Page scripts last -->
<script src="js/pages/dashboard.js"></script>
<script src="js/pages/inventory.js"></script>
<script src="js/pages/orders.js"></script>
<script src="js/pages/categories.js"></script>

</body>
</html>
