<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InvTrack — Inventory Management</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

<!-- AUTH SCREEN -->
<div id="auth-screen" class="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon-lg">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
      </div>
      <h1>InvTrack</h1>
      <p>Inventory Management System</p>
    </div>
    <div id="auth-error" class="alert alert-error hidden"></div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="admin@inventory.com" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="login-password" placeholder="••••••••" />
    </div>
    <button class="btn btn-primary btn-full" onclick="login()">Sign in</button>
    <p class="auth-hint">Demo: admin@inventory.com / admin123</p>
  </div>
</div>

<!-- APP -->
<div id="app" class="app hidden">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon-sm">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="1" width="6" height="6" rx="1"/><rect x="9" y="1" width="6" height="6" rx="1"/><rect x="1" y="9" width="6" height="6" rx="1"/><rect x="9" y="9" width="6" height="6" rx="1"/></svg>
      </div>
      <span>InvTrack</span>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">Main</div>
      <a class="nav-item active" data-page="dashboard" onclick="navigate('dashboard')">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="1" y="1" width="6" height="6" rx="1"/><rect x="9" y="1" width="6" height="6" rx="1"/><rect x="1" y="9" width="6" height="6" rx="1"/><rect x="9" y="9" width="6" height="6" rx="1"/></svg>
        Dashboard
      </a>
      <a class="nav-item" data-page="inventory" onclick="navigate('inventory')">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="2" width="12" height="12" rx="1.5"/><line x1="2" y1="6" x2="14" y2="6"/><line x1="6" y1="6" x2="6" y2="14"/></svg>
        Inventory
      </a>
      <a class="nav-item" data-page="orders" onclick="navigate('orders')">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M2 4h12M2 8h8M2 12h5"/></svg>
        Orders
      </a>
      <a class="nav-item" data-page="categories" onclick="navigate('categories')">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="5" cy="5" r="3"/><circle cx="11" cy="5" r="3"/><circle cx="8" cy="11" r="3"/></svg>
        Categories
      </a>
    </nav>
    <div class="sidebar-user">
      <div class="user-avatar" id="nav-avatar">A</div>
      <div class="user-info">
        <div class="user-name" id="nav-username">Loading...</div>
        <div class="user-role" id="nav-role">—</div>
      </div>
      <button class="btn-icon" onclick="logout()" title="Sign out">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M6 2H3a1 1 0 00-1 1v10a1 1 0 001 1h3M11 11l3-3-3-3M14 8H6"/></svg>
      </button>
    </div>
  </aside>

  <!-- Main content -->
  <main class="main-content">
    <div id="page-dashboard" class="page active"></div>
    <div id="page-inventory" class="page hidden"></div>
    <div id="page-orders" class="page hidden"></div>
    <div id="page-categories" class="page hidden"></div>
  </main>
</div>

<!-- MODAL -->
<div id="modal-overlay" class="modal-overlay hidden" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <h3 id="modal-title">Modal</h3>
      <button class="btn-icon" onclick="closeModal()">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="3" x2="13" y2="13"/><line x1="13" y1="3" x2="3" y2="13"/></svg>
      </button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<!-- TOAST -->
<div id="toast-container"></div>

<script src="/js/api.js"></script>
<script src="/js/app.js"></script>
<script src="/js/pages/dashboard.js"></script>
<script src="/js/pages/inventory.js"></script>
<script src="/js/pages/orders.js"></script>
<script src="/js/pages/categories.js"></script>
</body>
</html>
